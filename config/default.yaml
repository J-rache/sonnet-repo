# PNP Default Configuration

# Model/provider
# Defaults are local and no-live-call safe. Select any installed local model by
# setting PNP_INFERENCE_PROVIDER=ollama and PNP_MODEL_ID=<model>.
base_model: "local-model"
model_id: "local-model"
inference_provider: "mock"

providers:
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
  openai_compatible:
    api_base: "http://127.0.0.1:8001/v1"
    api_key_env: "OPENAI_API_KEY"
  ollama:
    api_base: "http://127.0.0.1:11434"

# Core process
heartbeat_interval_ms: 100
consolidation_idle_threshold_seconds: 30

# Memory
data_dir: "./data"
working_memory_capacity: 8192
embedding_dimensions: 128
episodic_db_path: "./data/episodic.db"
semantic_db_path: "./data/semantic.db"
embed_path: "./data/embeddings.pkl"
adapter_path: "./data/adapter"
core_state_path: "./data/core_state.json"
journal_path: "./data/events.jsonl"

# Consolidation
consolidation_batch_size: 20
episodic_decay_rate_per_hour: 0.02
episodic_consolidation_threshold: 0.15
consolidation_model_id: "local-model"
consolidation_max_tokens: 1000

# Adapter
adapter_checkpoint_interval: 100
adapter_max_deltas_in_memory: 1000
adapter_rank: 8
adapter_alpha: 8.0
adapter_learning_rate: 0.05
adapter_training_epochs: 80
adapter_auto_train: true
adapter_train_min_deltas: 1
adapter_train_interval: 1
adapter_seed: "pnp"
sync_model_enabled: true
sync_model_adapter_backend: "context_pack"
# Set sync_model_adapter_backend: "peft_lora" and sync_model_base_model to a
# local/Hugging Face causal-LM path when a trainable local runtime is available.
sync_model_base_model: ""
peft_training_epochs: 1
peft_batch_size: 1
peft_max_length: 512
peft_learning_rate: 0.0002

# API
api_host: "127.0.0.1"
api_port: 8000
api_log_level: "info"
local_api_token_env: "PNP_LOCAL_TOKEN"
local_api_token: "dev-local-token-change-me"
